function downloadPdfInNewTab() {

    // 1. Instantly open window on user tap to satisfy popup restrictions
    var pdfTab = window.open("", "_blank");

    if (!pdfTab){
        alert("Popup blocked.");
        return;
    }

    try {
        var pdfData = samplePdf;
        pdfData = pdfData.replace(/^data:application\/pdf;base64,/, "");

        // 2. Build explicit HTML string embedding the raw binary data inline via iframe
        var htmlContent = 
            '<html>' +
            '<head><title>Sample PDF</title></head>' +
            '<body style="margin:0; padding:0; height:100vh; overflow:hidden;">' +
                '<iframe src="data:application/pdf;base64,' + pdfData + '" width="100%" height="100%" style="border:none;"></iframe>' +
            '</body>' +
            '</html>';

        // 3. Populate child document directly
        pdfTab.document.write(htmlContent);
        pdfTab.document.close();
    }
    catch(e) {
        console.error(e);
        try {
            pdfTab.close();
        } catch(ignore){}
        alert("Unable to render PDF document: " + e);
    }
}
