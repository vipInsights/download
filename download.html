<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF Test</title>

<style>
body{
    font-family:Arial;
    margin:40px;
}

button{
    padding:12px 20px;
    font-size:18px;
    cursor:pointer;
}
</style>

</head>
<body>

<h2>PDF Download Test</h2>

<button onclick="downloadPdfInNewTab()">
Open PDF
</button>

<script>

// **************************************
// Replace with your Base64 PDF
// **************************************

var samplePdf =
"YOUR_BASE64_PDF_HERE";

// **************************************

function downloadPdfInNewTab() {

    // Must be directly inside click handler
    var pdfTab = window.open("", "_blank");

    if (!pdfTab){
        alert("Popup blocked.");
        return;
    }

    try{

        var pdfData = samplePdf;

        pdfData = pdfData.replace(/^data:application\/pdf;base64,/, "");

        var blob = base64ToBlob(pdfData,"application/pdf");

        console.log(blob);

        console.log(blob.size);

        var blobUrl = URL.createObjectURL(blob);

        console.log(blobUrl);

        pdfTab.location.href = blobUrl;

        setTimeout(function(){

            URL.revokeObjectURL(blobUrl);

        },60000);

    }
    catch(e){

        console.error(e);

        try{
            pdfTab.close();
        }
        catch(ignore){}

        alert(e);

    }

}

function base64ToBlob(base64,contentType){

    contentType = contentType || "";

    var sliceSize = 512;

    var byteCharacters = atob(base64);

    var byteArrays = [];

    for(var offset=0;offset<byteCharacters.length;offset+=sliceSize){

        var slice = byteCharacters.slice(offset,offset+sliceSize);

        var byteNumbers = new Array(slice.length);

        for(var i=0;i<slice.length;i++){

            byteNumbers[i]=slice.charCodeAt(i);

        }

        byteArrays.push(new Uint8Array(byteNumbers));

    }

    return new Blob(byteArrays,{
        type:contentType
    });

}

</script>

</body>
</html>
