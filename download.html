function downloadPdfInNewTab() {
    // 1. Open window immediately on user click to bypass popup blocks
    var pdfTab = window.open("", "_blank");

    if (!pdfTab){
        alert("Popup blocked.");
        return;
    }

    try {
        var pdfData = samplePdf;
        pdfData = pdfData.replace(/^data:application\/pdf;base64,/, "");

        // 2. Generate a local binary Blob inside the parent tab
        var blob = base64ToBlob(pdfData, "application/pdf");
        
        // 3. Instead of setting location.href (which iOS blocks), write an object/embed 
        // using an internal Object URL generated relative to the child window frame
        var blobUrl = pdfTab.URL.createObjectURL(blob);

        var htmlContent = 
            '<html>' +
            '<head><title>PDF Preview1</title></head>' +
            '<body style="margin:0; padding:0; height:100vh; overflow:hidden;">' +
                '<object data="' + blobUrl + '" type="application/pdf" width="100%" height="100%">' +
                    '<embed src="' + blobUrl + '" type="application/pdf" />' +
                '</object>' +
            '</body>' +
            '</html>';

        pdfTab.document.write(htmlContent);
        pdfTab.document.close();

        // 4. Clean up the memory allocation slightly later
        setTimeout(function() {
            try { pdfTab.URL.revokeObjectURL(blobUrl); } catch(e){}
        }, 60000);

    } catch(e) {
        console.error(e);
        try { pdfTab.close(); } catch(ignore){}
        alert("Error opening PDF: " + e.message);
    }
}

function base64ToBlob(base64, contentType){
    contentType = contentType || "";
    var sliceSize = 512;
    var byteCharacters = atob(base64);
    var byteArrays = [];

    for(var offset = 0; offset < byteCharacters.length; offset += sliceSize){
        var slice = byteCharacters.slice(offset, offset + sliceSize);
        var byteNumbers = new Array(slice.length);
        for(var i = 0; i < slice.length; i++){
            byteNumbers[i] = slice.charCodeAt(i);
        }
        byteArrays.push(new Uint8Array(byteNumbers));
    }

    return new Blob(byteArrays, { type: contentType });
}
